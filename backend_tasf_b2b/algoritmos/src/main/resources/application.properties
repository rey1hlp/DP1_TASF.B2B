spring.application.name=genetico

# --- CONEXION A XAMPP/MYSQL LOCAL ---
spring.datasource.url=jdbc:mysql://localhost:3306/tasf_b2b?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIONES DE HIBERNATE/JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- CONFIGURACIONES DE ARCHIVOS MULTIPART ---
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
#server.port=8080

# --- CONFIGURACIONES DE SEGURIDAD JWT ---
tasf.auth.jwt-secret=${TASF_AUTH_JWT_SECRET:change-this-dev-secret-before-production-please-keep-it-long}
tasf.auth.jwt-expiration-minutes=${TASF_AUTH_JWT_EXPIRATION_MINUTES:480}